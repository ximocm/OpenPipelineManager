name: Sync main back to dev

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-main-to-dev
  cancel-in-progress: false

env:
  SYNC_BRANCH: automation/sync-main-into-dev
  HAS_AUTOMATION_TOKEN: ${{ secrets.OPM_AUTOMATION_TOKEN != '' }}

jobs:
  open-sync-pr:
    name: open-sync-pr
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.OPM_AUTOMATION_TOKEN || github.token }}

      - name: Configure git author
        run: |
          git config user.name "openpipelinemanager-automation"
          git config user.email "actions@users.noreply.github.com"

      - name: Check whether dev needs main
        id: sync
        run: |
          git fetch origin main dev --prune

          if git merge-base --is-ancestor origin/main origin/dev; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "origin/dev already contains origin/main."
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "origin/dev does not contain origin/main; a sync PR is needed."
          fi

      - name: Warn when using the default token
        if: steps.sync.outputs.needed == 'true' && env.HAS_AUTOMATION_TOKEN != 'true'
        run: |
          echo "::warning::OPM_AUTOMATION_TOKEN is not configured. The workflow can still create a PR with GITHUB_TOKEN, but GitHub may not trigger the normal pull_request CI checks for that generated PR."

      - name: Create sync branch
        if: steps.sync.outputs.needed == 'true'
        run: |
          git switch --force-create "$SYNC_BRANCH" origin/dev
          git merge --no-ff origin/main -m "chore: sync main back into dev"
          git push --force-with-lease origin "HEAD:$SYNC_BRANCH"

      - name: Open or update sync pull request
        if: steps.sync.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.OPM_AUTOMATION_TOKEN || github.token }}
        run: |
          set -euo pipefail

          body=$(cat <<'BODY'
          This PR was opened automatically by `.github/workflows/sync-main-to-dev.yml`.

          It merges `main` back into `dev` so the integration branch keeps the release and hotfix history required by `GITGUIDELINES.md`.

          Merge this PR with **Create a merge commit**. Do not squash or rebase it; those merge methods create a new same-content commit but do not make `main` part of `dev` history.

          If CI does not start automatically, configure the repository secret `OPM_AUTOMATION_TOKEN` with a fine-grained PAT that has repository `contents` read/write and `pull requests` read/write permissions.
          BODY
          )

          if gh pr view "$SYNC_BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$SYNC_BRANCH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore: sync main back into dev" \
              --body "$body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base dev \
              --head "$SYNC_BRANCH" \
              --title "chore: sync main back into dev" \
              --body "$body"
          fi
